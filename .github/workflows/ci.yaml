name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://app:app@127.0.0.1:55432/app_test?serverVersion=16&charset=utf8

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, pdo_pgsql

      - uses: ramsey/composer-install@v4

      - name: Composer validate
        run: composer validate

      - name: Warm test kernel
        run: php bin/console about --env=test

      - name: Cache PHPStan
        uses: actions/cache@v4
        with:
          path: var/cache/phpstan
          key: phpstan-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            phpstan-${{ runner.os }}-${{ github.ref_name }}-
            phpstan-${{ runner.os }}-

      - name: PHPStan
        run: vendor/bin/phpstan analyse

      - name: ECS
        run: vendor/bin/ecs check

  tests-postgres:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://app:app@127.0.0.1:55432/app_test?serverVersion=16&charset=utf8

    services:
      database:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -d app_test -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, pdo_pgsql

      - uses: ramsey/composer-install@v4

      - name: PHPUnit
        run: vendor/bin/phpunit

  docker-smoke:
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests-postgres

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build app with cache
        run: docker compose build app

      - name: Start database and app
        run: docker compose up -d database app

      - name: Wait for app health
        run: docker compose ps

      - name: Install composer dependencies
        run: docker compose exec -T app composer install --no-interaction

      - name: Run migrations in container
        run: docker compose exec -T app php bin/console doctrine:migrations:migrate --no-interaction
