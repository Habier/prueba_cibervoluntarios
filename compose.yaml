
services:
  app:
    build:
      context: .
    ports:
      - "8081:80"
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      DATABASE_URL: postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8
      TEST_DATABASE_URL: postgresql://app:app@database:5432/app_test?serverVersion=16&charset=utf8
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      GPS_BATCH_SIZE: 100
      GPS_FLUSH_TIMEOUT_MS: 500
      GPS_PREFETCH_COUNT: 500
      GPS_MAX_BATCH_REQUEST_SIZE: 500
      GPS_SPEED_LIMIT_KMH: 120
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-gps:
    build:
      context: .
    command: php bin/console app:gps:consume
    healthcheck:
      disable: true
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      DATABASE_URL: postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      GPS_BATCH_SIZE: 100
      GPS_FLUSH_TIMEOUT_MS: 500
      GPS_PREFETCH_COUNT: 500
      GPS_MAX_BATCH_REQUEST_SIZE: 500
      GPS_SPEED_LIMIT_KMH: 120
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-alerts:
    build:
      context: .
    command: php bin/console app:alerts:consume
    healthcheck:
      disable: true
    environment:
      APP_ENV: dev
      APP_SECRET: dev-secret
      DATABASE_URL: postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8
    depends_on:
      database:
        condition: service_healthy

  database:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: app
      POSTGRES_USER: app
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      - ./docker/database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "app", "-U", "app"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  database_data:
